<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Conformidade</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:#0d2744; --blue:#2563a8; --border:#d1d9e6;
  --c-ok:#16a34a; --c-inv:#dc2626; --c-warn:#d97706;
  --muted:#64748b; --bg:#f1f5f9; --card:#fff;
  --radius:10px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:#1e293b; }

/* ── Header ── */
.header {
  background:var(--navy); color:#fff;
  padding:14px 28px; display:flex; align-items:center; gap:16px;
  flex-wrap:wrap;
}
.logo-img { height:44px; width:auto; border-radius:6px; }
.header-info h1 { font-size:17px; font-weight:700; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
.date-selector { display:flex; flex-direction:column; gap:3px; }
.date-selector label { font-size:12px; opacity:.8; }
#date-select {
  padding:6px 10px; border-radius:6px; border:none;
  font-size:13px; font-weight:600; background:#1e3a5f; color:#fff; cursor:pointer;
}
.btn-back {
  padding:6px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.3);
  font-size:12px; color:#fff; background:transparent; cursor:pointer; text-decoration:none;
}
.btn-back:hover { background:rgba(255,255,255,.1); }

/* ── Tabs ── */
.tabs { background:var(--card); border-bottom:1px solid var(--border); padding:0 28px; display:flex; gap:4px; }
.tab-btn {
  padding:12px 18px; border:none; background:none; cursor:pointer;
  font-size:13px; font-weight:600; color:var(--muted); border-bottom:3px solid transparent;
  margin-bottom:-1px;
}
.tab-btn.active { color:var(--blue); border-bottom-color:var(--blue); }

/* ── Container ── */
.main { max-width:1100px; margin:0 auto; padding:24px 20px 40px; }

/* ── Section card ── */
.section {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); padding:22px 24px; margin-bottom:22px;
}
.section-title {
  font-size:14px; font-weight:700; color:var(--navy); margin-bottom:16px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
}

/* ── CL Hero ── */
.cl-hero {
  text-align:center; padding:18px 24px;
  background:linear-gradient(135deg,#f0f4ff,#e8f0fe);
  border:1px solid #c7d7f8; border-radius:10px; margin-bottom:20px;
}
.cl-hero-label { font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:.06em; color:var(--blue); margin-bottom:6px; }
.cl-hero-score { font-size:54px; font-weight:900; color:var(--navy); line-height:1; }
.cl-hero-score.cl-green  { color:var(--c-ok); }
.cl-hero-score.cl-yellow { color:#ca8a04; }
.cl-hero-score.cl-red    { color:var(--c-inv); }
.cl-hero-max { font-size:13px; color:var(--muted); margin-bottom:12px; }
.cl-hero-formula { font-size:12px; color:var(--muted); line-height:1.8; }
.cl-hero-formula strong { color:var(--navy); }
.cl-hero-breakdown { font-size:12px; color:var(--muted); margin-top:2px; }

/* ── KPI Grid 2×3 ── */
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
@media(max-width:640px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
.kpi { border-radius:8px; padding:16px 18px; border:1px solid var(--border); }
.kpi-green  { background:linear-gradient(135deg,#f0fdf4,#dcfce7); border-color:#86efac; }
.kpi-yellow { background:linear-gradient(135deg,#fefce8,#fef9c3); border-color:#fde047; }
.kpi-nd     { background:#f8fafc; border-color:var(--border); }
.kpi-label  { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; opacity:.7; }
.kpi-value  { font-size:28px; font-weight:800; margin:6px 0 2px; }
.kpi-sub    { font-size:11px; opacity:.65; }
.kpi-nd .kpi-value  { color:var(--muted); }
.delta { font-size:13px; font-weight:700; margin-top:4px; }
.delta-up   { color:var(--c-ok); }
.delta-down { color:var(--c-inv); }
.delta-neu  { color:var(--blue); }
.delta-nd   { color:var(--muted); }

/* ── Status table (Seção 2) ── */
.status-wrap { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:center; }
@media(max-width:640px) { .status-wrap { grid-template-columns:1fr; } }
.donut-wrap { width:180px; }
@media(max-width:640px) { .donut-wrap { width:100%; max-width:220px; margin:0 auto; } }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; font-size:11px; font-weight:600; color:var(--muted);
     text-transform:uppercase; letter-spacing:.04em; padding:5px 8px; border-bottom:2px solid var(--border); }
td { padding:6px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
tr.nc td { background:#fff8f8; }
tr.na td { background:#fffbeb; }
tr:last-child td { border-bottom:none; }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; }
.num,.pct { text-align:right; font-variant-numeric:tabular-nums; }
.tag { display:inline-block; font-size:10px; font-weight:700; border-radius:4px; padding:1px 5px; }
.tag-nc { background:#fee2e2; color:#991b1b; }
.tag-na { background:#fef9c3; color:#854d0e; }

/* ── Bar sections (3,4,5) ── */
.bar-list { display:flex; flex-direction:column; gap:10px; }
.bar-item  { background:#f8fafc; border:1px solid var(--border); border-radius:8px;
             padding:10px 14px; cursor:pointer; }
.bar-item:hover { background:#f1f5f9; }
.bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.bar-title  { font-size:13px; font-weight:600; }
.bar-count  { font-size:13px; font-weight:700; color:var(--blue); white-space:nowrap; }
.bar-track  { background:#e2e8f0; border-radius:99px; height:6px; }
.bar-fill   { height:6px; border-radius:99px; }
.expand-list { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.bar-item.open .expand-list { display:block; }
.expand-arrow { font-size:10px; color:var(--muted); transition:transform .2s; flex-shrink:0; display:inline-block; }
.bar-item.open .expand-arrow { transform:rotate(90deg); }
.pill { display:inline-block; border-radius:99px; font-size:10px; font-weight:700; padding:2px 7px; }
.p-pend { background:#fef3c7; color:#b45309; }
.p-inv  { background:#fee2e2; color:#991b1b; }
.p-venc { background:#fee2e2; color:#991b1b; }
.p-rep  { background:#fee2e2; color:#991b1b; }
.p-val  { background:#dbeafe; color:#1e40af; }
.p-ok   { background:#dcfce7; color:#15803d; }

/* ── Detail table inside expand-list ── */
.detail-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:2px; }
.detail-table th { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase;
  letter-spacing:.04em; padding:4px 8px; border-bottom:1px solid var(--border); text-align:left; }
.detail-table td { padding:5px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
.detail-table tr:last-child td { border-bottom:none; }

/* ── Sub ranking tags ── */
.pill-tag { border-radius:99px; font-size:11px; font-weight:700; padding:3px 9px; display:inline-block; }

/* ── Seção 6 — CPCI ── */
.s-pend-falta { background:#fee2e2; color:#991b1b; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; }
.s-pint       { background:#dbeafe; color:#1e40af; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; }
.s-falta      { background:#fee2e2; color:#991b1b; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; }
.s-int-venc   { background:#f3e8ff; color:#7e22ce; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; }
.s-pend-gen   { background:#fef9c3; color:#854d0e; border-radius:6px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; }
.cpci-legend  { font-size:12px; color:var(--muted); margin-bottom:12px; }

/* ── Evolução charts ── */
.chart-grid  { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
@media(max-width:700px) { .chart-grid { grid-template-columns:1fr; } }
.chart-wrap  { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:14px; }
.chart-wrap.full { grid-column: 1/-1; }
.chart-title { font-size:12px; font-weight:700; color:var(--navy); margin-bottom:10px; }

/* ── Spinner / error ── */
.spinner { text-align:center; padding:60px; color:var(--muted); }
.error   { text-align:center; padding:40px; color:var(--c-inv); }
.var-note { font-size:11px; color:var(--muted); margin-bottom:8px; }
.tag-venc-exp { background:#fee2e2; color:#991b1b; border-radius:4px; font-size:10px; font-weight:700; padding:2px 6px; display:inline-block; }
.tag-venc-r   { background:#ffedd5; color:#c2410c; border-radius:4px; font-size:10px; font-weight:700; padding:2px 6px; display:inline-block; }
.tag-venc-y   { background:#fef9c3; color:#854d0e; border-radius:4px; font-size:10px; font-weight:700; padding:2px 6px; display:inline-block; }
.tag-venc-g   { background:#f1f5f9; color:#64748b; border-radius:4px; font-size:10px; font-weight:700; padding:2px 6px; display:inline-block; }

/* ── Aba Documentos ── */
.docs-filters {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; margin-bottom:14px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;
}
.docs-filters input {
  padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px;
  background:#f8fafc; outline:none; min-width:140px; flex:1 1 140px;
}
.docs-filters input:focus { border-color:var(--blue); background:#fff; }
.docs-tag-row { display:flex; flex-wrap:wrap; gap:6px; width:100%; }
.docs-tag-btn {
  font-size:11px; font-weight:700; padding:4px 10px; border-radius:99px;
  border:2px solid transparent; cursor:pointer; background:#f1f5f9; color:var(--muted);
  transition:opacity .15s;
}
.docs-tag-btn.active { opacity:1; }
.docs-tag-btn:not(.active) { opacity:.45; }
.docs-tag-btn.dt-rep   { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
.docs-tag-btn.dt-venc  { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
.docs-tag-btn.dt-pend  { background:#fef3c7; color:#b45309; border-color:#fcd34d; }
.docs-tag-btn.dt-val   { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
.docs-tag-btn.dt-ok    { background:#dcfce7; color:#15803d; border-color:#86efac; }
.docs-table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
.docs-table { width:100%; border-collapse:collapse; font-size:13px; }
.docs-table thead th {
  position:sticky; top:0; z-index:5;
  background:var(--navy); color:#fff;
  font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em;
  padding:9px 12px; text-align:left; white-space:nowrap;
}
.docs-table tbody td { padding:7px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
.docs-table tbody tr:last-child td { border-bottom:none; }
.docs-table tbody tr:hover td { background:#f8fafc; }
.docs-tag { display:inline-block; font-size:10px; font-weight:700; border-radius:99px; padding:2px 8px; white-space:nowrap; }
.docs-tag.dt-rep  { background:#fee2e2; color:#991b1b; }
.docs-tag.dt-venc { background:#fee2e2; color:#991b1b; }
.docs-tag.dt-pend { background:#fef3c7; color:#b45309; }
.docs-tag.dt-val  { background:#dbeafe; color:#1e40af; }
.docs-tag.dt-ok   { background:#dcfce7; color:#15803d; }
.docs-count { font-size:12px; color:var(--muted); margin-bottom:8px; }

/* ── Aba Integração (CP/CI detalhe) ── */
/* Band = métricas + CP/CI em card unificado */
.ci-header-band { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:24px; overflow:hidden; }
.ci-metrics { display:flex; flex-wrap:wrap; gap:0; border-bottom:1px solid var(--border); }
.ci-metric  { flex:1 1 140px; padding:14px 20px; border-right:1px solid var(--border); }
.ci-metric:last-child { border-right:0; }
.ci-metric-k { font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:600; }
.ci-metric-v { font-size:26px; font-weight:800; margin-top:4px; }
.ci-vok  { color:var(--c-ok); }
.ci-vbad { color:var(--c-inv); }
.ci-vmut { color:var(--muted); }
.ci-summary { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:18px; }
.ci-summary-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--navy); margin-bottom:12px; }
.ci-combo { width:100%; border-collapse:collapse; font-size:13px; }
.ci-combo thead th { text-align:left; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:600; padding:7px 10px; border-bottom:1px solid var(--border); }
.ci-combo tbody td { padding:9px 10px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
.ci-combo tbody tr:last-child td { border-bottom:0; }
.ci-num { text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }
.ci-kpi-row { display:flex; flex-wrap:wrap; gap:0; background:#fbfcfd; }
.ci-kpi { flex:1 1 200px; }
.ci-kpi-card { flex:1 1 200px; padding:16px 20px; border-right:1px solid var(--border); }
.ci-kpi-card:last-child { border-right:0; }
.ci-kpi-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.ci-kpi-val { font-size:28px; font-weight:800; margin:4px 0 2px; }
.ci-kpi-formula { font-size:11px; color:var(--muted); }
.ci-pill { display:inline-block; font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; }
.ci-pill.ci-ok   { background:#e9f5ed; color:var(--c-ok); }
.ci-pill.ci-bad  { background:#fbf0df; color:#b45309; }
.ci-pill.ci-crit { background:#fee2e2; color:#991b1b; }
.ci-pill.ci-nd   { background:#f1f5f9; color:#64748b; }
.ci-pill.ci-dim  { background:#f1f5f9; color:#64748b; }
.ci-cargo { display:block; font-size:11px; color:var(--muted); margin-top:2px; font-weight:400; }
.ci-controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:12px; }
.ci-search { flex:1 1 220px; max-width:320px; position:relative; }
.ci-search svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
.ci-search input { width:100%; padding:8px 12px 8px 30px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:var(--card); outline:none; }
.ci-filters { display:flex; gap:6px; flex-wrap:wrap; }
.ci-filter { font-size:12px; padding:6px 12px; border:1px solid var(--border); background:var(--card); border-radius:6px; cursor:pointer; color:var(--muted); }
.ci-filter.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.ci-expand-all { margin-left:auto; font-size:12px; padding:6px 12px; border:1px solid var(--border); background:var(--card); border-radius:6px; cursor:pointer; color:var(--muted); }
.ci-tablecard { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.ci-tablecard table { width:100%; border-collapse:collapse; }
.ci-tablecard thead th { font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; padding:10px 12px; border-bottom:1px solid var(--border); text-align:left; background:#fbfcfd; }
.ci-row td { padding:10px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; position:relative; }
.ci-row td:first-child { padding-left:16px; }
.ci-sev-rep td:first-child::before,
.ci-sev-pen td:first-child::before,
.ci-sev-val td:first-child::before,
.ci-sev-ok  td:first-child::before {
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.ci-sev-rep td:first-child::before { background:var(--c-inv); }
.ci-sev-pen td:first-child::before { background:var(--c-warn); }
.ci-sev-val td:first-child::before { background:var(--blue); }
.ci-sev-ok  td:first-child::before { background:var(--c-ok); }
.ci-nm  { display:block; font-weight:600; font-size:13px; }
.ci-exp-btn { background:none; border:0; cursor:pointer; color:var(--muted); padding:4px 6px; font-size:13px; line-height:1; transition:transform .15s; }
.ci-exp-btn[aria-expanded="true"] { transform:rotate(90deg); color:var(--blue); }
.ci-detail > td { background:#fafbfc; padding:0; border-bottom:1px solid #f1f5f9; }
.ci-dwrap { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:14px 12px 18px; }
@media(max-width:640px) { .ci-dwrap { grid-template-columns:1fr; } }
.ci-dcol-title { font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--navy); font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.ci-cnt { background:var(--navy); color:#fff; font-size:10px; padding:1px 6px; border-radius:10px; font-weight:600; }
.ci-doclist { list-style:none; margin:0; padding:0; }
.ci-doclist li { display:grid; grid-template-columns:10px 1fr auto; gap:8px; align-items:start; padding:5px 0; border-bottom:1px dashed #f1f5f9; }
.ci-doclist li:last-child { border-bottom:0; }
.ci-dot { width:8px; height:8px; border-radius:50%; margin-top:3px; flex-shrink:0; display:inline-block; }
.ci-dot-pen { background:var(--c-warn); }
.ci-dot-rep { background:var(--c-inv); }
.ci-dot-val { background:var(--blue); }
.ci-dname { font-size:12px; }
.ci-dst { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; white-space:nowrap; }
.ci-dst-pen  { background:#fef3c7; color:#b45309; }
.ci-dst-pend { background:#fef3c7; color:#b45309; }
.ci-dst-rep  { background:#fee2e2; color:#991b1b; }
.ci-dst-venc { background:#fee2e2; color:#991b1b; }
.ci-dst-val  { background:#dbeafe; color:#1e40af; }
.ci-dst-ok   { background:#dcfce7; color:#15803d; }
.ci-nd-msg { color:var(--muted); font-size:12px; font-style:italic; }
.ci-metric-sub { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }
.ci-kpi-card { flex:1 1 200px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; }
.ci-pill.ci-past { background:#fee2e2; color:#991b1b; }
</style>
</head>
<body>

<div class="header" id="page-header">
  <div class="header-info">
    <h1 id="header-title">Carregando…</h1>
  </div>
  <div class="header-right">
    <div class="date-selector">
      <label>Extração</label>
      <select id="date-select"></select>
    </div>
    <a class="btn-back" href="index.html">&#8592; Voltar ao menu</a>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-dash" onclick="showTab('dashboard')">Dashboard</button>
  <button class="tab-btn" id="tab-evol" onclick="showTab('evolucao')">Evolução</button>
  <button class="tab-btn" id="tab-integ" onclick="showTab('integracao')">Colaboradores e Prestadores</button>
  <button class="tab-btn" id="tab-docs" onclick="showTab('documentos')">Todos Documentos</button>
  <button class="tab-btn" id="tab-venc" onclick="showTab('vencimentos')">Vencimentos</button>
</div>

<div class="main">
  <div id="tab-content-dashboard">
    <div class="spinner" id="dash-spinner">Carregando dados…</div>
    <div id="dash-content" style="display:none"></div>
  </div>
  <div id="tab-content-evolucao" style="display:none">
    <div class="spinner" id="evol-spinner">Carregando histórico…</div>
    <div id="evol-content" style="display:none"></div>
  </div>
  <div id="tab-content-integracao" style="display:none">
    <div id="integ-content"></div>
  </div>
  <div id="tab-content-documentos" style="display:none">
    <div id="docs-content"></div>
  </div>
  <div id="tab-content-vencimentos" style="display:none">
    <div id="venc-content"></div>
  </div>
</div>

<script>
// ── Utilitários ──────────────────────────────────────────────────────────────
const qs      = k => new URLSearchParams(location.search).get(k);
const fmtDate = iso => { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
const fmtNum  = n  => (n??0).toLocaleString('pt-BR');
const fmtPct  = v  => v==null ? 'N/D' : (v.toFixed(1).replace('.',',') + '%');

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
  return r.json();
}

// ── Estado global ────────────────────────────────────────────────────────────
let PROJETO = qs('projeto') || 'eteca';
let CONFIG  = null;
let MANIFEST = null;
let CURRENT_DATA = null;
let HISTORICO = null;
let evolBuilt = false;
let chartInstances = {};

// ── CL helper ────────────────────────────────────────────────────────────────
function calcCL(m) {
  const cd = m.conf_pct != null ? m.conf_pct / 100 : 0;
  const cp = m.cp_pct  != null ? m.cp_pct  / 100 : 0;
  const ci = m.ci_pct  != null ? m.ci_pct  / 100 : 0;
  return (500 * cd) + (400 * cp) + (100 * ci);
}
function clClass(val) {
  return val >= 900 ? 'cl-green' : (val >= 700 ? 'cl-yellow' : 'cl-red');
}

// ── Inicialização ────────────────────────────────────────────────────────────
async function init() {
  try {
    CONFIG   = await fetchJSON(`projects/${PROJETO}/config.json`);
    MANIFEST = await fetchJSON(`data/${PROJETO}/manifest.json`);

    const logoEl = document.createElement('img');
    logoEl.className = 'logo-img';
    logoEl.alt = CONFIG.nome_display;
    logoEl.src = `projects/${PROJETO}/${CONFIG.logo_file}`;
    logoEl.onerror = () => logoEl.remove();
    document.querySelector('.header').prepend(logoEl);

    document.getElementById('header-title').textContent = CONFIG.nome_display;
    document.title = CONFIG.nome_display + ' — Conformidade';

    const sel = document.getElementById('date-select');
    const datas = [...MANIFEST.datas].reverse();
    datas.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = fmtDate(d);
      sel.appendChild(opt);
    });
    sel.value = MANIFEST.ultima;
    sel.addEventListener('change', () => loadDate(sel.value));

    await loadDate(MANIFEST.ultima);
  } catch(e) {
    document.getElementById('dash-spinner').innerHTML =
      `<div class="error">Erro ao carregar projeto: ${e.message}</div>`;
  }
}

async function loadDate(date) {
  document.getElementById('dash-spinner').style.display = '';
  document.getElementById('dash-content').style.display = 'none';
  evolBuilt = false;
  try {
    CURRENT_DATA = await fetchJSON(`data/${PROJETO}/${date}.json`);
    renderDashboard(CURRENT_DATA);
    document.getElementById('dash-spinner').style.display = 'none';
    document.getElementById('dash-content').style.display = '';
  } catch(e) {
    document.getElementById('dash-spinner').innerHTML =
      `<div class="error">Erro ao carregar extração ${date}: ${e.message}</div>`;
  }
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-content-dashboard').style.display   = tab==='dashboard'   ? '' : 'none';
  document.getElementById('tab-content-evolucao').style.display    = tab==='evolucao'    ? '' : 'none';
  document.getElementById('tab-content-integracao').style.display  = tab==='integracao'  ? '' : 'none';
  document.getElementById('tab-content-documentos').style.display  = tab==='documentos'  ? '' : 'none';
  document.getElementById('tab-content-vencimentos').style.display = tab==='vencimentos' ? '' : 'none';
  document.getElementById('tab-dash').classList.toggle('active',  tab==='dashboard');
  document.getElementById('tab-evol').classList.toggle('active',  tab==='evolucao');
  document.getElementById('tab-integ').classList.toggle('active', tab==='integracao');
  document.getElementById('tab-docs').classList.toggle('active',  tab==='documentos');
  document.getElementById('tab-venc').classList.toggle('active',  tab==='vencimentos');
  if (tab === 'evolucao'    && !evolBuilt)  loadEvolucao();
  if (tab === 'integracao'  && CURRENT_DATA) renderIntegracao(CURRENT_DATA);
  if (tab === 'documentos'  && CURRENT_DATA) renderDocumentos(CURRENT_DATA);
  if (tab === 'vencimentos' && CURRENT_DATA) renderVencimentos(CURRENT_DATA);
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard(d) {
  const m  = d.meta;
  const v  = d.variacao || {};
  const el = document.getElementById('dash-content');
  let html = '';

  // ── Seção 1 — Indicadores ───────────────────────────────────────────────
  function deltaHtml(val, neutral=false) {
    if (val == null) return '<span class="delta delta-nd">—</span>';
    const arrow = val >= 0 ? '&#9650;' : '&#9660;';
    const cls   = neutral ? 'delta-neu' : (val >= 0 ? 'delta-up' : 'delta-down');
    return `<span class="delta ${cls}">${arrow} ${Math.abs(val).toFixed(1).replace('.',',')}%</span>`;
  }
  const varNote = v.data_anterior
    ? `Comparação com extração de ${fmtDate(v.data_anterior)}`
    : 'Primeira extração — sem comparativo anterior';
  function clDeltaHtml(val) {
    if (val == null) return '<span class="delta delta-nd">—</span>';
    const arrow = val >= 0 ? '&#9650;' : '&#9660;';
    const cls   = val >= 0 ? 'delta-up' : 'delta-down';
    return '<span class="delta ' + cls + '">' + arrow + ' ' + Math.abs(val).toFixed(0) + ' pts</span>';
  }
  const d_cl = (v.data_anterior && v.d_conf != null)
    ? (500 * (v.d_conf||0) / 100) + (400 * (v.d_cp||0) / 100) + (100 * (v.d_ci||0) / 100)
    : null;

  // CL block
  const clVal  = calcCL(m);
  const clCls  = clClass(clVal);
  const cdPts  = m.conf_pct != null ? (500 * m.conf_pct / 100).toFixed(0) : '0';
  const cpPts  = m.cp_pct  != null ? (400 * m.cp_pct  / 100).toFixed(0) : '0';
  const ciPts  = m.ci_pct  != null ? (100 * m.ci_pct  / 100).toFixed(0) : '0';
  const cdStr  = m.conf_fmt || 'N/D';
  const cpStr  = m.cp_fmt  || 'N/D';
  const ciStr  = m.ci_fmt  || 'N/D';

  const cpOkStr = m.n_ativos != null
    ? fmtNum(m.cp_ok||0) + ' Todos docs conformes / ' + fmtNum(m.n_ativos) + ' Ativos'
    : (m.cp_ok != null ? fmtNum(m.cp_ok) + ' de ' + fmtNum(m.total_workers||0) + ' trabalhadores' : '');
  const ciOkStr = m.n_ativos != null
    ? fmtNum(m.ci_ok||0) + ' Acesso liberado / ' + fmtNum(m.n_ativos) + ' Ativos'
    : (m.ci_ok != null ? fmtNum(m.ci_ok) + ' de ' + fmtNum(m.total_workers||0) + ' trabalhadores' : '');
  const inlineDelta = (val, neutral=false) => {
    if (val == null) return '';
    const arrow = val >= 0 ? '&#9650;' : '&#9660;';
    const cls   = neutral ? 'delta-neu' : (val >= 0 ? 'delta-up' : 'delta-down');
    return ` <span class="delta ${cls}">(${arrow} ${Math.abs(val).toFixed(1).replace('.',',')}%)</span>`;
  };

  html += `
  <div class="section">
    <div class="section-title">Seção 1 — Indicadores de Conformidade</div>
    <div class="cl-hero">
      <div class="cl-hero-label">Conformidade Legal (CL) — Programa de Excelência SABESP</div>
      <div class="cl-hero-score ${clCls}">${clVal.toFixed(0)}</div>
      <div class="cl-hero-max">de 1.000 pts</div>
      <div class="cl-hero-formula">
        <strong>CL</strong> = (500 × <strong>${cdStr}</strong>) + (400 × <strong>${cpStr}</strong>) + (100 × <strong>${ciStr}</strong>)
      </div>
      <div class="cl-hero-breakdown">${cdPts} + ${cpPts} + ${ciPts} = ${clVal.toFixed(0)} pts</div>
      <div style="margin-top:10px">${clDeltaHtml(d_cl)}</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi ${m.conf_class||'kpi-nd'}">
        <div class="kpi-label">CD — Conformidade Documental</div>
        <div class="kpi-value">${m.conf_fmt}${inlineDelta(v.d_conf)}</div>
        <div class="kpi-sub">${fmtNum(m.total-m.nc)} conformes de ${fmtNum(m.total)}</div>
      </div>
      <div class="kpi ${m.cp_class||'kpi-nd'}">
        <div class="kpi-label">CP — Conformidade Pessoal</div>
        <div class="kpi-value">${m.cp_fmt||'N/D'}${inlineDelta(v.d_cp)}</div>
        ${cpOkStr ? '<div class="kpi-sub">' + cpOkStr + '</div>' : ''}
      </div>
      <div class="kpi ${m.ci_class||'kpi-nd'}">
        <div class="kpi-label">CI — Conformidade de Integração</div>
        <div class="kpi-value">${m.ci_fmt||'N/D'}${inlineDelta(v.d_ci)}</div>
        ${ciOkStr ? '<div class="kpi-sub">' + ciOkStr + '</div>' : ''}
      </div>
      <div class="kpi ${m.ader_class||'kpi-nd'}">
        <div class="kpi-label">Aderência</div>
        <div class="kpi-value">${m.ader_fmt}${inlineDelta(v.d_ader)}</div>
        <div class="kpi-sub">${fmtNum(m.total-m.na)} aderentes de ${fmtNum(m.total)}</div>
      </div>
      <div class="kpi kpi-nd">
        <div class="kpi-label">Total de Documentos</div>
        <div class="kpi-value" style="color:var(--navy)">${fmtNum(m.total)}${inlineDelta(v.d_total, true)}</div>
        <div class="kpi-sub">registros ativos no contrato</div>
      </div>
      <div class="kpi kpi-nd">
        <div class="kpi-label">Subcontratadas</div>
        <div class="kpi-value" style="color:var(--navy)">${m.n_subs}${inlineDelta(v.d_subs, true)}</div>
        <div class="kpi-sub">empresas com documentos no contrato</div>
      </div>
    </div>
    <div class="var-note" style="margin-top:12px">${varNote}</div>
  </div>`;

  // ── Seção 2 — Status dos Documentos ─────────────────────────────────────
  const donut = d.donut || {};
  const statusRows = d.status_rows || [];
  const total = m.total || 1;
  let statusTbody = '';
  statusRows.forEach(r => {
    const rowCls = r.is_na ? ' class="na"' : (r.is_nc ? ' class="nc"' : '');
    const ncTag  = r.is_nc ? '<span class="tag tag-nc">NC</span>' : '—';
    const naTag  = r.is_na ? '<span class="tag tag-na">NA</span>' : '—';
    statusTbody += `<tr${rowCls}>
      <td><span class="dot" style="background:${r.color}"></span></td>
      <td>${r.label}</td>
      <td class="num">${fmtNum(r.qty)}</td>
      <td class="pct">${r.pct.toFixed(1).replace('.',',')}%</td>
      <td>${ncTag}</td><td>${naTag}</td></tr>`;
  });

  html += `
  <div class="section">
    <div class="section-title">Seção 2 — Status dos Documentos</div>
    <div class="status-wrap">
      <div>
        <table>
          <thead><tr>
            <th></th><th>Status</th><th class="num">Qtd.</th>
            <th class="pct">%</th><th>NC</th><th>NA</th>
          </tr></thead>
          <tbody>${statusTbody}</tbody>
        </table>
      </div>
      <div class="donut-wrap">
        <canvas id="donut-chart" width="180" height="180"></canvas>
      </div>
    </div>
  </div>`;

  // ── Seção 3 — CP & CI ────────────────────────────────────────────────────
  const cpci = d.cpci || [];
  let cpciHtml = '';
  if (!m.cp_pct && m.cp_pct !== 0) {
    cpciHtml = '<div style="font-size:13px;color:var(--muted)">CSV de integração não disponível para esta extração.</div>';
  } else if (cpci.length === 0) {
    cpciHtml = '<div style="font-size:13px;color:var(--c-ok)">Todos os trabalhadores com Acesso Liberado.</div>';
  } else {
    const stBadge = st => {
      if (st==='Pendências e Falta Integração') return `<span class="s-pend-falta">${st}</span>`;
      if (st==='Pendências porém Integrado')    return `<span class="s-pint">${st}</span>`;
      if (st==='Falta Integração')              return `<span class="s-falta">${st}</span>`;
      if (st==='Integração Vencida')            return `<span class="s-int-venc">${st}</span>`;
      return `<span class="s-pend-gen">${st}</span>`;
    };
    const cp_rows = cpci.filter(r => r.status !== 'Pendências porém Integrado');
    const ci_rows = cpci.filter(r => r.status === 'Pendências porém Integrado');

    if (cp_rows.length) {
      cpciHtml += '<p style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px">'
        + 'Falta Integração: não conformes para CP e CI (' + cp_rows.length + ')</p>';
      cpciHtml += '<ul style="margin:0 0 12px 0;padding-left:18px;">';
      cp_rows.forEach(function(r) {
        cpciHtml += '<li style="font-size:13px;margin-bottom:4px">'
          + r.funcionario + ' — ' + r.fornecedor + '&ensp;' + stBadge(r.status)
          + '</li>';
      });
      cpciHtml += '</ul>';
    }
    if (ci_rows.length) {
      cpciHtml += '<p style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px">'
        + 'Integrados: porém com pendências (' + ci_rows.length + ')</p>';
    }
    cpciHtml += '<div class="var-note" style="margin-top:6px;font-size:14px">Ver detalhes completos na aba '
      + '<a href="#" onclick="showTab(\'integracao\');return false;" style="color:var(--blue);font-weight:600;text-decoration:underline">Colaboradores e Prestadores</a>.'
      + '</div>';
  }

  html += `
  <div class="section">
    <div class="section-title">Seção 3 — Conformidade Pessoal (CP) e Conformidade de Integração (CI)</div>
    ${cpciHtml}
  </div>`;

  // ── Seção 4 — Ranking Subcontratadas ─────────────────────────────────────
  const subs = d.subs || [];
  let subsHtml = '<div class="bar-list">';
  subs.forEach((s, i) => {
    const rows = (s.entries || []).map(e => {
      const pillCls = {pend:'p-pend',venc:'p-venc',rep:'p-rep',val:'p-val',ok:'p-ok'}[e.badge]||'p-pend';
      return `<tr><td>${e.func}</td><td>${e.doc_s}</td><td><span class="pill ${pillCls}">${e.st_s}</span></td></tr>`;
    }).join('') || `<tr><td colspan="3" style="color:var(--muted);font-size:12px">Sem pendências.</td></tr>`;
    const barPct = Math.min(parseFloat(s.taxa)||0, 100);
    subsHtml += `
    <div class="bar-item" onclick="toggle(this)">
      <div class="bar-header">
        <span style="display:flex;align-items:center;gap:8px">
          <span class="expand-arrow">&#9654;</span>
          <span class="bar-title"><strong style="color:var(--muted);margin-right:4px">${i+1}.</strong>${s.nome}</span>
        </span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="pill-tag" style="background:${s.pill_color}22;color:${s.pill_color}">${s.taxa}%</span>
          <span class="bar-count">${s.focus} pend.</span>
        </span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${barPct}%;background:${s.pill_color}"></div></div>
      <div class="expand-list">
        <table class="detail-table">
          <thead><tr><th>Funcionário</th><th>Documento</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  subsHtml += '</div>';

  html += `
  <div class="section">
    <div class="section-title">Seção 4 — Ranking de Subcontratadas</div>
    ${subsHtml}
  </div>`;

  // ── Seção 5 — Pendências por Documento ──────────────────────────────────
  const docs = d.docs || [];
  let docsHtml = '<div class="bar-list">';
  docs.forEach(item => {
    const rows = item.entries.map(e => {
      const pillCls = {pend:'p-pend',venc:'p-venc',rep:'p-rep',val:'p-val',ok:'p-ok'}[e.badge]||'p-pend';
      return `<tr><td>${e.empresa}</td><td>${e.func}</td><td><span class="pill ${pillCls}">${e.st_s}</span></td></tr>`;
    }).join('');
    docsHtml += `
    <div class="bar-item" onclick="toggle(this)">
      <div class="bar-header">
        <span style="display:flex;align-items:center;gap:8px">
          <span class="expand-arrow">&#9654;</span>
          <span class="bar-title"><span class="dot" style="background:${item.color}"></span>${item.name}</span>
        </span>
        <span class="bar-count">${item.count}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${item.pct}%;background:${item.color}"></div></div>
      <div class="expand-list">
        <table class="detail-table">
          <thead><tr><th>Empresa</th><th>Funcionário</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  docsHtml += '</div>';

  html += `
  <div class="section">
    <div class="section-title">Seção 5 — Pendências por Tipo de Documento</div>
    ${docsHtml}
  </div>`;

  // ── Seção 6 — NC por Tipo ─────────────────────────────────────────────────
  const ncStatus = d.nc_status || [];
  let ncHtml = '<div class="bar-list">';
  ncStatus.forEach(item => {
    const rows = item.entries.map(e =>
      `<tr><td>${e.empresa}</td><td>${e.func}</td><td>${e.doc_s}</td></tr>`
    ).join('');
    ncHtml += `
    <div class="bar-item" onclick="toggle(this)">
      <div class="bar-header">
        <span style="display:flex;align-items:center;gap:8px">
          <span class="expand-arrow">&#9654;</span>
          <span class="bar-title" style="color:${item.color}">${item.label}</span>
        </span>
        <span class="bar-count">${item.count}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${item.pct}%;background:${item.color}"></div></div>
      <div class="expand-list">
        <table class="detail-table">
          <thead><tr><th>Empresa</th><th>Funcionário</th><th>Documento</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  ncHtml += '</div>';

  html += `
  <div class="section">
    <div class="section-title">Seção 6 — NC por Tipo de Problema</div>
    ${ncHtml}
  </div>`;

  // ── Atualizar botão aba Vencimentos ──────────────────────────────────────
  const vencProx = d.vencimento_proximo || [];
  const nVenc    = vencProx.length;
  const hasVencidos = vencProx.some(e => e.tag === 'vencido');
  const hasUrgent   = hasVencidos || vencProx.some(e => e.tag === 'vermelho');
  const tabVencEl = document.getElementById('tab-venc');
  tabVencEl.textContent = (hasVencidos ? '⚠ ' : '') + 'Vencimentos (' + nVenc + ')';
  tabVencEl.style.color = hasUrgent ? 'var(--c-inv)' : '';
  tabVencEl.style.fontWeight = hasUrgent ? '700' : '';

  // ── Render ────────────────────────────────────────────────────────────────
  el.innerHTML = html;

  if (donut.labels && donut.labels.length) {
    const ctx = document.getElementById('donut-chart').getContext('2d');
    if (chartInstances['donut']) chartInstances['donut'].destroy();
    chartInstances['donut'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: donut.labels,
        datasets: [{ data: donut.data, backgroundColor: donut.colors, borderWidth: 1 }]
      },
      options: {
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}: ${fmtNum(ctx.parsed)} (${(ctx.parsed/total*100).toFixed(1).replace('.',',')}%)`
            }
          }
        },
        cutout: '60%',
      }
    });
  }
}

// ── Evolução ─────────────────────────────────────────────────────────────────
async function loadEvolucao() {
  const spinner = document.getElementById('evol-spinner');
  const content = document.getElementById('evol-content');
  spinner.style.display = '';
  content.style.display = 'none';
  try {
    HISTORICO = await fetchJSON(`data/${PROJETO}/historico.json`);
    renderEvolucao(HISTORICO);
    spinner.style.display = 'none';
    content.style.display = '';
    evolBuilt = true;
  } catch(e) {
    spinner.innerHTML = `<div class="error">Erro ao carregar histórico: ${e.message}</div>`;
  }
}

function renderEvolucao(hist) {
  const n = Math.min((CONFIG && CONFIG.evolucao_n) ? CONFIG.evolucao_n : 10, 10);
  const slice = hist.slice(-n);
  const labels = slice.map(h => fmtDate(h.data));
  const content = document.getElementById('evol-content');

  content.innerHTML = `
  <div class="section">
    <div class="section-title">Aba Evolução — Últimas ${slice.length} extrações</div>
    <div class="chart-grid">
      <div class="chart-wrap full"><div class="chart-title">CL — Conformidade Legal (pts)</div><canvas id="ch-cl"></canvas></div>
      <div class="chart-wrap"><div class="chart-title">CD — Conformidade Documental (%)</div><canvas id="ch-cd"></canvas></div>
      <div class="chart-wrap"><div class="chart-title">CP — Conformidade Pessoal (%)</div><canvas id="ch-cp"></canvas></div>
      <div class="chart-wrap"><div class="chart-title">CI — Conformidade de Integração (%)</div><canvas id="ch-ci"></canvas></div>
      <div class="chart-wrap"><div class="chart-title">Aderência (%)</div><canvas id="ch-ad"></canvas></div>
      <div class="chart-wrap full"><div class="chart-title">Total de Documentos</div><canvas id="ch-tot"></canvas></div>
    </div>
  </div>`;

  const buildLine = (id, data, color, meta_line, isTotal=false, isCL=false) => {
    const ctx = document.getElementById(id).getContext('2d');
    if (chartInstances[id]) chartInstances[id].destroy();
    const datasets = [{
      label: id.replace('ch-','').toUpperCase(),
      data, borderColor: color, backgroundColor: color + '22',
      fill: true, tension: 0.3, spanGaps: true, pointRadius: 4, pointHoverRadius: 6,
    }];
    if (meta_line != null && !isTotal) {
      datasets.push({
        label: isCL ? `Zona verde (${meta_line} pts)` : `Meta (${meta_line}%)`,
        data: slice.map(() => meta_line),
        borderColor: isCL ? '#16a34a' : '#dc2626', borderDash: [6,4], borderWidth: 1.5,
        pointRadius: 0, fill: false,
      });
    }
    chartInstances[id] = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { display: datasets.length > 1, labels: { font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: c => {
                const v = c.parsed.y;
                if (v == null) return ' N/D';
                return (isTotal || isCL) ? ` ${fmtNum(Math.round(v))}` : ` ${v.toFixed(1).replace('.',',')}%`;
              }
            }
          }
        },
        scales: {
          y: {
            min: isTotal ? undefined : (isCL ? Math.max(0, Math.floor(Math.min(...data.filter(v => v != null)) - 50)) : Math.max(0, Math.floor(Math.min(...data.filter(v => v != null)) - 5))),
            max: isTotal ? undefined : (isCL ? 1000 : 100),
            ticks: { font: { size: 11 }, callback: v => (isTotal || isCL) ? fmtNum(v) : v + '%' },
          },
          x: { ticks: { font: { size: 11 } } }
        }
      }
    });
  };

  buildLine('ch-cl',  slice.map(h => Math.round((500*(h.conf_pct||0)/100)+(400*(h.cp_pct||0)/100)+(100*(h.ci_pct||0)/100))), '#b45309', 900, false, true);
  buildLine('ch-cd',  slice.map(h => h.conf_pct), '#2563a8', 95);
  buildLine('ch-cp',  slice.map(h => h.cp_pct),   '#7c3aed', 95);
  buildLine('ch-ci',  slice.map(h => h.ci_pct),   '#0891b2', 95);
  buildLine('ch-ad',  slice.map(h => h.ader_pct), '#059669', 99);
  buildLine('ch-tot', slice.map(h => h.total),     '#64748b', null, true);
}

// ── Aba Todos Documentos ─────────────────────────────────────────────────────
function renderDocumentos(d) {
  var rows = d.all_docs || [];
  var el   = document.getElementById('docs-content');
  if (!rows.length) { el.innerHTML = '<div class="spinner">Sem dados de documentos.</div>'; return; }

  // Grupos de filtro (clique aplica — sem filtro = exibe tudo)
  var GROUPS = [
    { id:'pendente',  label:'Pendente',          cls:'dt-pend', sts:['Pendente'] },
    { id:'reprovado', label:'Reprovado',          cls:'dt-rep',  sts:['Isenção reprovada','Reprovado','Reprovado pelo cliente'] },
    { id:'vencido',   label:'Vencido',            cls:'dt-venc', sts:['Vencido'] },
    { id:'perto',     label:'Perto do vencimento',cls:'dt-pend', sts:['Perto do vencimento'] },
    { id:'validacao', label:'Em validação',       cls:'dt-val',  sts:['Isenção em análise','Em validação'] },
    { id:'aprovado',  label:'Aprovado',           cls:'dt-ok',   sts:['Isenção aprovada','Aprovado com ressalva','Aprovado pelo cliente','Aprovado'] },
  ];

  // Mapa st_s → grupo
  var ST_GROUP = {};
  GROUPS.forEach(function(g) { g.sts.forEach(function(s) { ST_GROUP[s] = g.id; }); });

  // Estado: Set de grupos ativos (vazio = sem filtro = exibe tudo)
  var activeGroups = new Set();

  function doFilter() {
    var qEmp  = (document.getElementById('docs-q-emp').value  || '').toLowerCase();
    var qFunc = (document.getElementById('docs-q-func').value || '').toLowerCase();
    var qDoc  = (document.getElementById('docs-q-doc').value  || '').toLowerCase();
    var noGrp = activeGroups.size === 0;
    var n = 0;
    document.querySelectorAll('#docs-tbody tr').forEach(function(tr) {
      var grpOk = noGrp || activeGroups.has(tr.dataset.grp);
      var ok = grpOk
        && (!qEmp  || tr.dataset.emp.indexOf(qEmp)   >= 0)
        && (!qFunc || tr.dataset.func.indexOf(qFunc) >= 0)
        && (!qDoc  || tr.dataset.doc.indexOf(qDoc)   >= 0);
      tr.style.display = ok ? '' : 'none';
      if (ok) n++;
    });
    document.getElementById('docs-count').textContent =
      n.toLocaleString('pt-BR') + ' de ' + rows.length.toLocaleString('pt-BR') + ' documentos';
  }

  // Botões de grupo
  var tagBtns = GROUPS.map(function(g) {
    return '<button class="docs-tag-btn ' + g.cls + '" data-grp="' + g.id + '">' + g.label + '</button>';
  }).join('');

  // Linhas da tabela
  var tbody = '';
  rows.forEach(function(r) {
    var grp = ST_GROUP[r.st_s] || 'aprovado';
    tbody += '<tr data-grp="' + grp + '"'
      + ' data-emp="'  + r.empresa.toLowerCase().replace(/"/g,'') + '"'
      + ' data-func="' + r.func.toLowerCase().replace(/"/g,'') + '"'
      + ' data-doc="'  + r.doc.toLowerCase().replace(/"/g,'') + '">'
      + '<td style="white-space:nowrap">' + r.empresa + '</td>'
      + '<td style="white-space:nowrap">' + r.func + '</td>'
      + '<td>' + r.doc + '</td>'
      + '<td style="white-space:nowrap"><span class="docs-tag dt-' + r.sev + '">' + r.st_s + '</span></td>'
      + '</tr>';
  });

  el.innerHTML = ''
    + '<div class="docs-filters">'
    +   '<input id="docs-q-emp"  type="search" placeholder="Empresa…">'
    +   '<input id="docs-q-func" type="search" placeholder="Funcionário…">'
    +   '<input id="docs-q-doc"  type="search" placeholder="Documento…">'
    +   '<div class="docs-tag-row">' + tagBtns + '</div>'
    + '</div>'
    + '<div class="docs-count" id="docs-count">' + rows.length.toLocaleString('pt-BR') + ' documentos</div>'
    + '<div class="docs-table-wrap">'
    +   '<table class="docs-table">'
    +     '<thead><tr>'
    +       '<th>Empresa</th><th>Funcionário</th><th>Documento</th><th>Status</th>'
    +     '</tr></thead>'
    +     '<tbody id="docs-tbody">' + tbody + '</tbody>'
    +   '</table>'
    + '</div>';

  // Filtros de texto
  ['docs-q-emp','docs-q-func','docs-q-doc'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', doFilter);
  });

  // Filtros de grupo (clique aplica; segundo clique remove)
  document.querySelectorAll('.docs-tag-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var grp = btn.dataset.grp;
      if (activeGroups.has(grp)) { activeGroups.delete(grp); btn.classList.remove('active'); }
      else                        { activeGroups.add(grp);    btn.classList.add('active');    }
      doFilter();
    });
  });
}

// ── Aba Vencimentos ───────────────────────────────────────────────────────────
function renderVencimentos(d) {
  var vp  = d.vencimento_proximo || [];
  var el  = document.getElementById('venc-content');
  var nExp = vp.filter(function(e) { return e.tag === 'vencido'; }).length;
  var title = 'Documentos — Vencidos e Próximos ao Vencimento (' + vp.length + ')';
  var inner = '';

  if (vp.length === 0) {
    inner = '<div style="font-size:13px;color:var(--c-ok)">Nenhum documento vencido ou com vencimento nos próximos 30 dias.</div>';
  } else {
    var tagLbl = function(tag) {
      if (tag === 'vencido')  return '<span class="tag-venc-exp">Vencido</span>';
      if (tag === 'vermelho') return '<span class="tag-venc-r">&le;10 dias</span>';
      if (tag === 'amarelo')  return '<span class="tag-venc-y">&le;20 dias</span>';
      return '<span class="tag-venc-g">&le;30 dias</span>';
    };
    var tbody = '';
    vp.forEach(function(e) {
      var srch = (e.empresa + ' ' + e.func + ' ' + e.doc).toLowerCase().replace(/"/g, '');
      var docShort = e.doc.length > 40 ? e.doc.slice(0, 38) + '…' : e.doc;
      tbody += '<tr data-search="' + srch + '">'
        + '<td style="white-space:nowrap">' + tagLbl(e.tag) + '</td>'
        + '<td style="white-space:nowrap">' + e.empresa + '</td>'
        + '<td style="white-space:nowrap">' + e.func + '</td>'
        + '<td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + e.doc.replace(/"/g,'&quot;') + '">' + docShort + '</td>'
        + '<td style="white-space:nowrap">' + e.data_venc + '</td>'
        + '</tr>';
    });
    var ctrl = '<div class="ci-searchbar" style="margin-bottom:12px">'
      + '<input id="venc-q" type="search" placeholder="Buscar funcionário, empresa ou documento…" autocomplete="off" style="width:100%;box-sizing:border-box">'
      + '</div>';
    inner = ctrl
      + '<table><thead><tr>'
      + '<th>Alerta</th><th>Empresa</th><th>Funcionário</th><th>Documento</th><th>Vencimento</th>'
      + '</tr></thead><tbody id="venc-tbody">' + tbody + '</tbody></table>';
  }

  el.innerHTML = '<div class="section"><div class="section-title">' + title + '</div>' + inner + '</div>';
  if (vp.length > 0) {
    document.getElementById('venc-q').addEventListener('input', vencFilter);
  }
}

function vencFilter() {
  var rawQ = (document.getElementById('venc-q').value || '').toLowerCase();
  document.querySelectorAll('#venc-tbody tr').forEach(function(row) {
    var search = row.dataset.search || '';
    row.style.display = (!rawQ || search.indexOf(rawQ) >= 0) ? '' : 'none';
  });
}

// ── Aba Integração — CP/CI Detalhe ───────────────────────────────────────────

function pillCI(txt, ok) {
  // Quadro Resumo — linha única
  if (txt === 'Pendências e Falta Integração' || txt === 'Falta Integração')
    return '<span class="ci-pill ci-crit">' + txt + '</span>';
  if (txt === 'N.D.')
    return '<span class="ci-pill ci-nd">N.D.</span>';
  return '<span class="ci-pill ' + (ok ? 'ci-ok' : 'ci-bad') + '">' + txt + '</span>';
}

function pillCIDetail(txt) {
  // Tabela de detalhe — linha dupla em tags longos
  if (txt === 'Pendências e Falta Integração')
    return '<span class="ci-pill ci-crit" style="white-space:normal;line-height:1.3">Pendências e<br>Falta Integração</span>';
  if (txt === 'Pendências porém Integrado')
    return '<span class="ci-pill ci-bad" style="white-space:normal;line-height:1.3">Pendências porém<br>Integrado</span>';
  if (txt === 'Falta Integração')
    return '<span class="ci-pill ci-crit">Falta Integração</span>';
  if (txt === 'Acesso Liberado')
    return '<span class="ci-pill ci-ok">Acesso Liberado</span>';
  if (txt === 'N.D.')
    return '<span class="ci-pill ci-nd">N.D.</span>';
  return '<span class="ci-pill ci-bad">' + txt + '</span>';
}

      this.setAttribute('aria-expanded', String(!open));
    });
  });
}

function ciFilter() {
  var rawQ = (document.getElementById('ci-q').value || '').toLowerCase();
  var activeBtn = document.querySelector('.ci-filter.active');
  var f = activeBtn ? activeBtn.dataset.f : 'all';
  document.querySelectorAll('#ci-tbody .ci-row').forEach(function(row) {
    var search  = row.dataset.search || '';
    var matchQ  = !rawQ || search.indexOf(rawQ) >= 0;
    var matchF  = true;
    if (f === 'liberado') matchF = row.dataset.liberado === '1';
    if (f === 'clean')    matchF = row.dataset.clean    === '1';
    if (f === 'pess')     matchF = row.dataset.pess     === '1';
    if (f === 'emp')      matchF = row.dataset.emp      === '1';
    var show = matchQ && matchF;
    row.style.display = show ? '' : 'none';
    var idx = row.querySelector('.ci-exp-btn');
    if (idx) {
      var det = document.getElementById('ci-det-' + idx.dataset.idx);
      if (det && !show) det.style.display = 'none';
    }
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function toggle(el) { el.classList.toggle('open'); }

// ── Start ────────────────────────
init();
</script>
